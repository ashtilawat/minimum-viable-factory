services:
  - type: web
    name: trello-clone
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trello-clone-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: trello-clone
          property: url

databases:
  - name: trello-clone-db
    plan: starter
    databaseName: trello_clone
